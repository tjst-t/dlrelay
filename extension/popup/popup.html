<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>DL Relay</h1>
    <div class="header-actions">
      <div class="status" id="status">
        <span class="dot" id="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
          <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.434-.901 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.421-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main view: detected videos -->
  <div id="view-main">
    <div id="media-list" class="media-list">
      <div class="empty" id="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <p>No videos detected on this page</p>
        <p class="empty-hint">Videos will appear as they are found</p>
      </div>
    </div>
  </div>

  <!-- Settings view -->
  <div id="view-settings" class="hidden">
    <div class="section">
      <label class="label" for="server-url">Server URL</label>
      <input type="url" id="server-url" placeholder="http://your-nas:8090">
    </div>

    <div class="section">
      <label class="label" for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="Optional API key for authentication">
    </div>

    <div class="section">
      <label class="label">Mode</label>
      <div class="toggle-group">
        <button class="toggle active" data-mode="video">Video Only</button>
        <button class="toggle" data-mode="all">All Downloads</button>
      </div>
    </div>

    <div class="section">
      <label class="label" for="min-file-size">Min File Size (KB)</label>
      <input type="number" id="min-file-size" min="0" step="10" value="100" class="input-number">
      <span class="hint">Filter small files (ads). 0 = no filter</span>
    </div>

    <div class="section">
      <label class="switch">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
        <span class="switch-label">Download Interception Enabled</span>
      </label>
    </div>

    <div class="section">
      <label class="switch">
        <input type="checkbox" id="auto-download">
        <span class="slider"></span>
        <span class="switch-label">Auto-download detected videos</span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="row">
        <span class="label">Recent Activity</span>
        <button class="link-btn" id="clear-btn">Clear</button>
      </div>
      <div id="activity-list" class="activity-list">
        <div class="empty">No relayed downloads yet</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="dashboard-link">Open Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
